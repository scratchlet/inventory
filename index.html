<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchlet | Inventory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Nunito", sans-serif;
            font-weight: 700;
            color: white;
            min-height: 100vh;
            background: linear-gradient(160deg, #fff4d6 0%, #ffc76a 25%, #ff9b2f 50%, #ff7f11 75%, #8f3200 100%);
            overflow-x: hidden;
        }
        
        /* BACKGROUND */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .square {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .12);
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            from { transform: translateY(-120px); }
            to { transform: translateY(120vh) rotate(360deg); }
        }
        
        /* NAVBAR */
        .navbar {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: #ff7f11;
            box-shadow: inset 0 -6px rgba(0,0,0,.2);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .logo {
            font-family: "Titan One", cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: none;
        }
        
        /* HUD */
        .hud {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .coins {
            background: rgba(255, 255, 255, .2);
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 900;
        }
        
        /* BUTTONS */
        .btn {
            font-family: "Nunito", sans-serif;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: .12s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .primary, .secondary {
            padding: 10px 16px;
            border-radius: 14px;
            box-shadow: 0 6px 0 rgba(0,0,0,.25);
        }
        
        .primary {
            background: white;
            color: #ff8c1a;
        }
        
        .secondary {
            background: rgba(255, 255, 255, .18);
            color: white;
            border: 2px solid rgba(255, 255, 255, .25);
        }
        
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,.25);
        }
        
        /* SIDEBAR */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            opacity: 0;
            pointer-events: none;
            transition: .25s ease;
            z-index: 998;
        }
        
        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: #ff8c1a;
            box-shadow: -10px 0 25px rgba(0,0,0,.25);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: .3s ease;
            z-index: 999;
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-family: "Titan One", cursive;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
            gap: 10px;
            width: 100%;
        }
        
        /* INVENTORY LAYOUT */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 25px;
        }
        
        /* ONE BIG UNIFIED CONTAINER CARD */
        .big-inventory-card {
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        
        .inventory-title {
            font-family: "Titan One", cursive;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* CONTROLS UTILITY ROW */
        .inventory-controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-bar-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 10px 16px 10px 42px;
            font-family: "Nunito", sans-serif;
            font-weight: 700;
            color: white;
            font-size: 0.95rem;
            outline: none;
            width: 220px;
            transition: border-color 0.2s, width 0.2s;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            width: 260px;
        }

        .search-bar-wrapper .material-icons {
            position: absolute;
            left: 14px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .filter-dropdown {
            background: #ff7f11;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            padding: 10px 32px 10px 16px;
            font-family: "Nunito", sans-serif;
            font-weight: 800;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }
        
        /* MAIN IMAGE BUTTON WRAPPER FOR SCROLLING */
        .inventory-scroll-container {
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 8px;
            min-height: 120px;
        }
        
        .inventory-scroll-container::-webkit-scrollbar {
            width: 8px;
        }
        .inventory-scroll-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .inventory-scroll-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        /* PACK SECTION SEPARATORS */
        .pack-section {
            margin-bottom: 30px;
        }

        .pack-section:last-child {
            margin-bottom: 10px;
        }

        .pack-section-title {
            font-family: "Titan One", cursive;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #fff1d0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pack-section-line {
            border: none;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 15px;
        }
        
        /* GRID ROWS FOR THE BLOONS */
        .blook-image-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            padding: 5px;
        }
        
        /* BLOOK IMAGE BUTTON */
        .blook-img-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
            width: 84px;
            height: 84px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
        }
        
        .blook-img-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.12);
            z-index: 2;
        }
        
        .blook-img-btn:active {
            transform: scale(0.96);
        }
        
        .blook-graphic {
            width: 75%;
            height: 75%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        /* NUMBER OWNED BADGE */
        .blook-qty-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: "Titan One", cursive;
            font-size: 0.85rem;
            z-index: 3;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        .no-results-text {
            text-align: center;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            padding-top: 40px;
        }

        /* VIEWING BLOOK CARD MODAL */
        .modal-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-container.show {
            opacity: 1;
            pointer-events: auto;
        }

        .blook-view-card {
            background: #ff8c1a;
            border: 4px solid white;
            border-radius: 24px;
            width: 340px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            transform: scale(0.8);
            transition: transform 0.2s ease;
        }

        .modal-container.show .blook-view-card {
            transform: scale(1);
        }

        .close-card-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-graphic-frame {
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            margin: 10px auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-graphic {
            width: 75%;
            height: 75%;
            object-fit: contain;
        }

        .card-name {
            font-family: "Titan One", cursive;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .card-meta-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            background: rgba(0,0,0,0.15);
        }

        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            font-family: "Nunito", sans-serif;
            font-weight: 900;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .btn-sell {
            background: white;
            color: #d62424;
        }

        .btn-sell-dupes {
            background: #ffb633;
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="background"></div>

<div class="overlay" id="overlay"></div>

<div class="modal-container" id="cardModalContainer">
    <div class="blook-view-card">
        <button class="close-card-btn" id="closeCardBtn"><span class="material-icons">close</span></button>
        
        <div class="card-graphic-frame">
            <img src="" alt="" class="card-graphic" id="modalGraphic">
        </div>
        
        <div class="card-name" id="modalName">Blook Name</div>
        
        <div class="card-meta-row">
            <div class="card-pill" id="modalRarity">Rarity</div>
            <div class="card-pill" id="modalChance">0%</div>
            <div class="card-pill" id="modalOwned">Owned: 0</div>
        </div>
        
        <div class="card-actions">
            <button class="action-btn btn-sell" id="sellSingleBtn">Sell (🪙 <span id="sellValue">0</span>)</button>
            <button class="action-btn btn-sell-dupes" id="sellDupesBtn">Sell Duplicates</button>
        </div>
    </div>
</div>

<div class="sidebar" id="menu">
    <div class="sidebar-header">
        <div>Menu</div>
        <button class="btn secondary" id="closeMenu"><span class="material-icons">close</span></button>
    </div>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">home</span> Home</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">store</span> Market</a>
    <a href="https://google.com" class="btn secondary menu-item active"><span class="material-icons">inventory_2</span> Inventory</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">bar_chart</span> Stats</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">article</span> News</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">post_add</span> Posts</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">sports_esports</span> Play</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">chat</span> Chat</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">swap_horiz</span> Trading</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">settings</span> Settings</a>
    <a href="https://google.com" class="btn primary menu-item" id="logoutBtn"><span class="material-icons">logout</span> Logout</a>
</div>

<nav class="navbar">
    <div class="logo">Scratchlet</div>
    <div class="hud">
        <div class="coins">🪙 <span id="coinCount">240</span></div>
        <button class="btn secondary" id="menuBtn"><span class="material-icons">menu</span></button>
    </div>
</nav>

<div class="container">
    <div class="big-inventory-card">
        <div class="inventory-header">
            <div class="inventory-title">
                <span class="material-icons" style="font-size: 2.2rem;">inventory_2</span> Blook Collection
            </div>
            
            <div class="inventory-controls-row">
                <div class="search-bar-wrapper">
                    <span class="material-icons">search</span>
                    <input type="text" class="search-input" id="blookSearchInput" placeholder="Search Blooks..." oninput="processFilters()">
                </div>
                
                <select class="filter-dropdown" id="categoryFilterDropdown" onchange="processFilters()">
                    <option value="all">All Blooks</option>
                    <optgroup label="Packs">
                        <option value="pack:Breakfast Pack">Breakfast Pack</option>
                        <option value="pack:Space Pack">Space Pack</option>
                    </optgroup>
                    <optgroup label="Rarities">
                        <option value="rarity:Uncommon">Uncommon</option>
                        <option value="rarity:Rare">Rare</option>
                        <option value="rarity:Epic">Epic</option>
                    </optgroup>
                </select>
            </div>
        </div>
        
        <div class="inventory-scroll-container" id="inventoryScrollContainer"></div>
    </div>
</div>

<script>
    /* GAME ENGINE STATES */
    let currentBalance = 240;
    let selectedBlook = null;

    const menu = document.getElementById("menu");
    const overlay = document.getElementById("overlay");
    const modalContainer = document.getElementById("cardModalContainer");
    
    document.getElementById("menuBtn").onclick = () => { menu.classList.add("open"); overlay.classList.add("show"); };
    document.getElementById("closeMenu").onclick = closeMenu;
    overlay.onclick = () => { closeMenu(); closeCardModal(); };
    document.getElementById("closeCardBtn").onclick = closeCardModal;
    
    function closeMenu() {
        menu.classList.remove("open");
        overlay.classList.remove("show");
    }

    /* BACKGROUND GENERATOR */
    const bg = document.querySelector(".background");
    for(let i=0; i<45; i++) {
        const s = document.createElement("div");
        s.className = "square";
        s.style.left = Math.random() * 100 + "%";
        s.style.width = s.style.height = (Math.random() * 25 + 10) + "px";
        s.style.opacity = Math.random() * 0.5 + 0.2;
        s.style.animationDuration = (Math.random() * 10 + 6) + "s";
        bg.appendChild(s);
    }

    const FALLBACK_IMAGE = "https://i.postimg.cc/9fZwBPpg/Placeholder.png";

    /* ========================================================================
       EDITABLE BLOOK LIST DATA STRUCTURE
       ========================================================================
       You can freely modify the 'image' URLs and 'rarityColor' hex values below.
    */
    const packs = {
        breakfast: {
            name: "Breakfast Pack",
            blooks: [
                {name:"Toast", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#32cd32"},
                {name:"Cereal", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#32cd32"},
                {name:"Yogurt", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#32cd32"},
                {name:"Breakfast Combo", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#32cd32"},
                {name:"Orange Juice", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#32cd32"},
                {name:"Milk", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#32cd32"},
                {name:"Waffle", rarity:"Rare", chance:9, image:"", rarityColor:"#1e70d4"},
                {name:"Pancakes", rarity:"Rare", chance:9, image:"", rarityColor:"#1e70d4"},
                {name:"French Toast", rarity:"Epic", chance:5, image:"", rarityColor:"#d62424"},
                {name:"Pizza", rarity:"Epic", chance:2, image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150&auto=format&fit=crop&q=60", rarityColor:"orange"}
            ]
        },
        space: {
            name: "Space Pack",
            blooks: [
                {name:"Earth", rarity:"Uncommon", chance:30, image:"", rarityColor:"#32cd32"},
                {name:"Meteor", rarity:"Rare", chance:20, image:"", rarityColor:"#1e70d4"},
                {name:"Alien", rarity:"Epic", chance:5, image:"", rarityColor:"#d62424"}
            ]
        }
    };

    const rarityValues = { "Uncommon": 5, "Rare": 20, "Epic": 75 };

    /* RUNTIME ENGINE INVENTORY DATA SOURCE */
    const inventoryData = [];
    let runtimeId = 1;

    Object.keys(packs).forEach(key => {
        const currentPack = packs[key];
        currentPack.blooks.forEach(blook => {
            inventoryData.push({
                id: runtimeId++,
                name: blook.name,
                rarity: blook.rarity,
                chance: blook.chance,
                image: blook.image || "",
                rarityColor: blook.rarityColor || "#7f8c8d", // Fallback color if missing
                packName: currentPack.name,
                qty: Math.floor(Math.random() * 5) + 1 
            });
        });
    });

    /* INTERACTIVE FILTER AND SEARCH PROCESSING PIPELINE */
    function processFilters() {
        const scrollBox = document.getElementById("inventoryScrollContainer");
        scrollBox.innerHTML = "";
        
        const searchVal = document.getElementById("blookSearchInput").value.toLowerCase().trim();
        const dropDownVal = document.getElementById("categoryFilterDropdown").value;
        
        let validItems = inventoryData.filter(item => item.qty > 0);
        
        if(searchVal !== "") {
            validItems = validItems.filter(item => item.name.toLowerCase().includes(searchVal));
        }
        
        if(dropDownVal !== "all") {
            const [filterType, targetValue] = dropDownVal.split(":");
            if(filterType === "pack") {
                validItems = validItems.filter(item => item.packName === targetValue);
            } else if(filterType === "rarity") {
                validItems = validItems.filter(item => item.rarity === targetValue);
            }
        }
        
        if (validItems.length === 0) {
            scrollBox.innerHTML = `<div class="no-results-text">No matching Blooks found.</div>`;
            return;
        }

        const groups = {};
        validItems.forEach(item => {
            if(!groups[item.packName]) {
                groups[item.packName] = [];
            }
            groups[item.packName].push(item);
        });

        Object.keys(groups).forEach(packTitle => {
            const section = document.createElement("div");
            section.className = "pack-section";

            const titleEl = document.createElement("div");
            titleEl.className = "pack-section-title";
            titleEl.textContent = packTitle;
            
            const lineEl = document.createElement("hr");
            lineEl.className = "pack-section-line";

            const gridEl = document.createElement("div");
            gridEl.className = "blook-image-container";

            groups[packTitle].forEach(item => {
                const button = document.createElement("button");
                button.className = "blook-img-btn";
                button.onclick = () => openCardModal(item);
                
                const activeSrc = (item.image && item.image !== "") ? item.image : FALLBACK_IMAGE;

                button.innerHTML = `
                    <div class="blook-qty-badge" style="background-color: ${item.rarityColor};">${item.qty}</div>
                    <img class="blook-graphic" src="${activeSrc}" alt="${item.name}">
                `;
                gridEl.appendChild(button);
            });

            section.appendChild(titleEl);
            section.appendChild(lineEl);
            section.appendChild(gridEl);
            scrollBox.appendChild(section);
        });
    }

    /* VIEW CARD MODAL CONTROLLERS */
    function openCardModal(blookItem) {
        selectedBlook = blookItem;
        
        document.getElementById("modalName").textContent = blookItem.name;
        document.getElementById("modalRarity").textContent = blookItem.rarity;
        document.getElementById("modalRarity").style.backgroundColor = blookItem.rarityColor;
        document.getElementById("modalChance").textContent = blookItem.chance + "%";
        document.getElementById("modalOwned").textContent = "Owned: " + blookItem.qty;
        document.getElementById("modalGraphic").src = (blookItem.image && blookItem.image !== "") ? blookItem.image : FALLBACK_IMAGE;
        
        const price = rarityValues[blookItem.rarity] || 5;
        document.getElementById("sellValue").textContent = price;
        
        document.getElementById("sellDupesBtn").style.display = blookItem.qty > 1 ? "block" : "none";

        overlay.classList.add("show");
        modalContainer.classList.add("show");
    }

    function closeCardModal() {
        modalContainer.classList.remove("show");
        if(!menu.classList.contains("open")) {
            overlay.classList.remove("show");
        }
        selectedBlook = null;
    }

    /* QUANTITY ACCOUNT TRANSACTION PIPELINES */
    document.getElementById("sellSingleBtn").onclick = () => {
        if (!selectedBlook || selectedBlook.qty <= 0) return;
        
        const value = rarityValues[selectedBlook.rarity] || 5;
        currentBalance += value;
        selectedBlook.qty -= 1;
        
        updateSystemHUD();
        
        if (selectedBlook.qty === 0) {
            closeCardModal();
        } else {
            openCardModal(selectedBlook);
        }
        processFilters();
    };

    document.getElementById("sellDupesBtn").onclick = () => {
        if (!selectedBlook || selectedBlook.qty <= 1) return;
        
        const duplicateCount = selectedBlook.qty - 1;
        const value = (rarityValues[selectedBlook.rarity] || 5) * duplicateCount;
        
        currentBalance += value;
        selectedBlook.qty = 1;
        
        updateSystemHUD();
        openCardModal(selectedBlook);
        processFilters();
    };

    function updateSystemHUD() {
        document.getElementById("coinCount").textContent = currentBalance;
    }

    processFilters();
</script>
</body>
</html>
