<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchlet | Inventory Layout</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Nunito", sans-serif;
            font-weight: 700;
            color: white;
            min-height: 100vh;
            background: linear-gradient(160deg, #fff4d6 0%, #ffc76a 25%, #ff9b2f 50%, #ff7f11 75%, #8f3200 100%);
            overflow-x: hidden;
        }
        
        /* BACKGROUND */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .square {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .12);
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            from { transform: translateY(-120px); }
            to { transform: translateY(120vh) rotate(360deg); }
        }
        
        /* NAVBAR */
        .navbar {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: #ff7f11;
            box-shadow: inset 0 -6px rgba(0,0,0,.2);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .logo {
            font-family: "Titan One", cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: none;
        }
        
        /* HUD */
        .hud {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .coins {
            background: rgba(255, 255, 255, .2);
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 900;
        }
        
        /* BUTTONS */
        .btn {
            font-family: "Nunito", sans-serif;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: .12s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .primary, .secondary {
            padding: 10px 16px;
            border-radius: 14px;
            box-shadow: 0 6px 0 rgba(0,0,0,.25);
        }
        
        .primary {
            background: white;
            color: #ff8c1a;
        }
        
        .secondary {
            background: rgba(255, 255, 255, .18);
            color: white;
            border: 2px solid rgba(255, 255, 255, .25);
        }
        
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,.25);
        }
        
        /* SIDEBAR */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            opacity: 0;
            pointer-events: none;
            transition: .25s ease;
            z-index: 998;
        }
        
        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: #ff8c1a;
            box-shadow: -10px 0 25px rgba(0,0,0,.25);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: .3s ease;
            z-index: 999;
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-family: "Titan One", cursive;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
            gap: 10px;
            width: 100%;
        }
        
        /* INVENTORY LAYOUT */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 25px;
        }
        
        /* ONE BIG UNIFIED CONTAINER CARD */
        .big-inventory-card {
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        
        .inventory-title {
            font-family: "Titan One", cursive;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* CONTROLS UTILITY ROW */
        .inventory-controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-bar-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-input {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 10px 16px 10px 42px;
            font-family: "Nunito", sans-serif;
            font-weight: 700;
            color: white;
            font-size: 0.95rem;
            outline: none;
            width: 220px;
            transition: border-color 0.2s, width 0.2s;
        }
        
        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            width: 260px;
        }
        
        .search-bar-wrapper .material-icons {
            position: absolute;
            left: 14px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        
        .filter-dropdown {
            background: #ff7f11;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            padding: 10px 32px 10px 16px;
            font-family: "Nunito", sans-serif;
            font-weight: 800;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }
        
        /* MAIN IMAGE BUTTON WRAPPER FOR SCROLLING */
        .inventory-scroll-container {
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 8px;
            min-height: 120px;
        }
        
        .inventory-scroll-container::-webkit-scrollbar {
            width: 8px;
        }
        .inventory-scroll-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .inventory-scroll-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
        
        /* PACK SECTION SEPARATORS */
        .pack-section {
            margin-bottom: 30px;
        }
        
        .pack-section:last-child {
            margin-bottom: 10px;
        }
        
        .pack-section-title {
            font-family: "Titan One", cursive;
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #fff1d0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .pack-section-line {
            border: none;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 15px;
        }
        
        /* GRID ROWS FOR THE BLOONS */
        .blook-image-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            padding: 5px;
        }
        
        /* BLOOK IMAGE BUTTON */
        .blook-img-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
            width: 84px;
            height: 84px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
        }
        
        .blook-img-btn:not(.locked):hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.12);
            z-index: 2;
        }
        
        .blook-img-btn:not(.locked):active {
            transform: scale(0.96);
        }

        /* GREYSCALE + LOCK FOR UNOWNED BLOOKS */
        .blook-img-btn.locked {
            filter: grayscale(100%);
            opacity: 0.55;
            cursor: not-allowed;
        }
        
        .blook-graphic {
            width: 75%;
            height: 75%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }
        
        /* NUMBER OWNED BADGE */
        .blook-qty-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: "Titan One", cursive;
            font-size: 0.85rem;
            z-index: 3;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        .blook-qty-badge .material-icons {
            font-size: 1rem;
        }
        
        .no-results-text {
            text-align: center;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            padding-top: 40px;
        }
        
        /* VIEWING BLOOK CARD MODAL - RECTANGLE SIDE BY SIDE */
        .modal-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 20px;
        }
        
        .modal-container.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .blook-view-card {
            background: #ff8c1a;
            border: 4px solid white;
            border-radius: 24px;
            width: 520px;
            max-width: 100%;
            padding: 30px 25px 25px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            transform: scale(0.8);
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 25px;
        }
        
        .modal-container.show .blook-view-card {
            transform: scale(1);
        }
        
        .close-card-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        /* LEFT COLUMN */
        .card-left-col {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-graphic-frame {
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-graphic {
            width: 75%;
            height: 75%;
            object-fit: contain;
        }
        
        /* RIGHT COLUMN */
        .card-right-col {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .card-name {
            font-family: "Titan One", cursive;
            font-size: 1.8rem;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        
        .card-meta-row {
            display: flex;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }
        
        .card-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            background: rgba(0,0,0,0.15);
        }
        
        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            font-family: "Nunito", sans-serif;
            font-weight: 900;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        
        .btn-sell {
            background: white;
            color: #d62424;
        }
        
        .btn-sell-dupes {
            background: #ffb633;
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
        }

        /* Responsive stack for very small screens */
        @media (max-width: 480px) {
            .blook-view-card {
                flex-direction: column;
                text-align: center;
                padding-top: 40px;
            }
            .card-right-col {
                text-align: center;
                width: 100%;
            }
            .card-meta-row {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="background"></div>
<div class="overlay" id="overlay"></div>

<div class="modal-container" id="cardModalContainer">
    <div class="blook-view-card">
        <button class="close-card-btn" id="closeCardBtn"><span class="material-icons">close</span></button>
        
        <div class="card-left-col">
            <div class="card-graphic-frame">
                <img src="" alt="" class="card-graphic" id="modalGraphic">
            </div>
        </div>
        
        <div class="card-right-col">
            <div class="card-name" id="modalName">Blook Name</div>
            
            <div class="card-meta-row">
                <div class="card-pill" id="modalRarity">Rarity</div>
                <div class="card-pill" id="modalChance">0%</div>
                <div class="card-pill" id="modalOwned">Owned: 0</div>
            </div>
            
            <div class="card-actions">
                <button class="action-btn btn-sell" id="sellSingleBtn">Sell (🪙 <span id="sellValue">0</span>)</button>
                <button class="action-btn btn-sell-dupes" id="sellDupesBtn">Sell Duplicates</button>
            </div>
        </div>
    </div>
</div>

<div class="sidebar" id="menu">
    <div class="sidebar-header">
        <div>Menu</div>
        <button class="btn secondary" id="closeMenu"><span class="material-icons">close</span></button>
    </div>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">home</span> Home</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">store</span> Market</a>
    <a href="https://google.com" class="btn secondary menu-item active"><span class="material-icons">inventory_2</span> Inventory</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">bar_chart</span> Stats</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">article</span> News</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">post_add</span> Posts</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">sports_esports</span> Play</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">chat</span> Chat</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">swap_horiz</span> Trading</a>
    <a href="https://google.com" class="btn secondary menu-item"><span class="material-icons">settings</span> Settings</a>
    <button class="btn primary menu-item" id="logoutBtn"><span class="material-icons">logout</span> Logout</button>
</div>

<nav class="navbar">
    <div class="logo">Scratchlet</div>
    <div class="hud">
        <div class="coins">🪙 <span id="coinCount">...</span></div>
        <button class="btn secondary" id="menuBtn"><span class="material-icons">menu</span></button>
    </div>
</nav>

<div class="container">
    <div class="big-inventory-card">
        <div class="inventory-header">
            <div class="inventory-title">
                <span class="material-icons" style="font-size: 2.2rem;">inventory_2</span> Blook Collection
            </div>
            
            <div class="inventory-controls-row">
                <div class="search-bar-wrapper">
                    <span class="material-icons">search</span>
                    <input type="text" class="search-input" id="blookSearchInput" placeholder="Search Blooks...">
                </div>
                
                <select class="filter-dropdown" id="categoryFilterDropdown">
                    <option value="all">All Blooks</option>
                    <optgroup label="Packs">
                        <option value="pack:Breakfast Pack">Breakfast Pack</option>
                        <option value="pack:Space Pack">Space Pack</option>
                    </optgroup>
                    <optgroup label="Rarities">
                        <option value="rarity:Uncommon">Uncommon</option>
                        <option value="rarity:Rare">Rare</option>
                        <option value="rarity:Epic">Epic</option>
                    </optgroup>
                </select>
            </div>
        </div>
        
        <div class="inventory-scroll-container" id="inventoryScrollContainer"></div>
    </div>
</div>

<script type="module">
    /* ================= FIREBASE INITIALIZATION ================= */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {  getAuth,  onAuthStateChanged,  signOut} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {  getFirestore,  doc,  getDoc,  setDoc} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {  
        apiKey: "AIzaSyBzyszqkVPOn_Zbs0eacE1KQccYsTxul1E",  
        authDomain: "scratchlet-ss.firebaseapp.com",  
        projectId: "scratchlet-ss",  
        storageBucket: "scratchlet-ss.firebasestorage.app",  
        messagingSenderId: "265174756634",  
        appId: "1:265174756634:web:a4c40ae00434f077e090a3",  
        measurementId: "G-7B7B6VXYJX"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    /* ================= GAME STATES ================= */
    let coins = 0;
    let ownedBlocks = new Set(); 
    let currentUser = null;
    let selectedBlook = null;

    onAuthStateChanged(auth, async (user) => {  
        if (!user) {    
            location.href = "https://scratchlet.github.io/login/";  
        } else {    
            currentUser = user;    
            await loadUserData();  
        }
    });

    document.getElementById("logoutBtn").onclick = async () => {  
        try {    
            await signOut(auth);    
            location.href = "https://scratchlet.github.io/login/";  
        } catch (err) {    
            console.error(err);  
        }
    };

    /* ================= CLOUD DATABASE CONTROL ================= */
    async function loadUserData() {    
        if (!currentUser) return;    
        try {        
            const userDocRef = doc(db, "users", currentUser.uid);        
            const userSnapshot = await getDoc(userDocRef);                
            if (userSnapshot.exists()) {            
                const data = userSnapshot.data();            
                coins = data.coins !== undefined ? data.coins : 2500;            
                ownedBlocks = new Set(data.ownedBlocks || []);        
            } else {            
                coins = 2500;            
                ownedBlocks = new Set();            
                await saveUserData();        
            }        
            document.getElementById("coinCount").innerText = coins;
            buildRuntimeInventory();
        } catch (error) {        
            console.error("Error pulling cloud data Profile:", error);    
        }
    }

    async function saveUserData() {    
        if (!currentUser) return;    
        try {        
            const userDocRef = doc(db, "users", currentUser.uid);        
            await setDoc(userDocRef, {            
                coins: coins,            
                ownedBlocks: Array.from(ownedBlocks)        
            }, { merge: true });    
        } catch (error) {        
            console.error("Error saving backup cloud sync profile:", error);    
        }
    }

    /* ================= SIDEBAR SCRIPTS ================= */
    const menu = document.getElementById("menu");
    const overlay = document.getElementById("overlay");
    const modalContainer = document.getElementById("cardModalContainer");
    
    document.getElementById("menuBtn").onclick = () => { menu.classList.add("open"); overlay.classList.add("show"); };
    document.getElementById("closeMenu").onclick = closeMenu;
    overlay.onclick = () => { closeMenu(); closeCardModal(); };
    document.getElementById("closeCardBtn").onclick = closeCardModal;
    
    function closeMenu() {
        menu.classList.remove("open");
        overlay.classList.remove("show");
    }

    /* BACKGROUND GENERATOR */
    const bg = document.querySelector(".background");
    for(let i=0; i<45; i++) {
        const s = document.createElement("div");
        s.className = "square";
        s.style.left = Math.random() * 100 + "%";
        s.style.width = s.style.height = (Math.random() * 25 + 10) + "px";
        s.style.opacity = Math.random() * 0.5 + 0.2;
        s.style.animationDuration = (Math.random() * 10 + 6) + "s";
        bg.appendChild(s);
    }

    const FALLBACK_IMAGE = "https://i.postimg.cc/9fZwBPpg/Placeholder.png";

    /* ========================================================================
       GLOBAL IMAGE CONSTANTS & PACKS DATA STRUCTURE
       ========================================================================
    */
    const CONFIG = {
        pizzaBlook: "https://i.postimg.cc/YSnT0Zmh/Pizza.webp",
        fallbackPlaceholder: "https://i.postimg.cc/p9VdWF3K/Placeholder.png"
    };

    const packs = {
        breakfast: {
            name: "Breakfast Pack",
            blooks: [
                {name:"Toast", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#4CFF4C"},
                {name:"Cereal", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#4CFF4C"},
                {name:"Yogurt", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#4CFF4C"},
                {name:"Breakfast Combo", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#4CFF4C"},
                {name:"Orange Juice", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#4CFF4C"},
                {name:"Milk", rarity:"Uncommon", chance:12.5, image:"", rarityColor:"#4CFF4C"},
                {name:"Waffle", rarity:"Rare", chance:9, image:"", rarityColor:"#4DA3FF"},
                {name:"Pancakes", rarity:"Rare", chance:9, image:"", rarityColor:"#4DA3FF"},
                {name:"French Toast", rarity:"Epic", chance:5, image:"", rarityColor:"#FF4D4D"},
                {name:"Pizza", rarity:"Epic", chance:2, image: CONFIG.pizzaBlook, rarityColor:"#FF4D4D"}
            ]
        },
        space: {
            name: "Space Pack",
            blooks: [
                {name:"Earth", rarity:"Uncommon", chance:30, image:"", rarityColor:"#4CFF4C"},
                {name:"Meteor", rarity:"Rare", chance:20, image:"", rarityColor:"#4DA3FF"},
                {name:"Alien", rarity:"Epic", chance:5, image:"", rarityColor:"#FF4D4D"}
            ]
        }
    };

    const rarityValues = { "Uncommon": 5, "Rare": 20, "Epic": 75 };

    /* RUNTIME ENGINE INVENTORY DATA SOURCE */
    let inventoryData = [];

    function buildRuntimeInventory() {
        inventoryData = [];
        let runtimeId = 1;

        Object.keys(packs).forEach(key => {
            const currentPack = packs[key];
            currentPack.blooks.forEach(blook => {
                // Count occurrences inside the array saved system
                const collectionArray = Array.from(ownedBlocks);
                const countOwned = collectionArray.filter(name => name === blook.name).length;

                inventoryData.push({
                    id: runtimeId++,
                    name: blook.name,
                    rarity: blook.rarity,
                    chance: blook.chance,
                    image: blook.image || "",
                    rarityColor: blook.rarityColor || "#7f8c8d",
                    packName: currentPack.name,
                    qty: countOwned 
                });
            });
        });
        processFilters();
    }

    /* INTERACTIVE FILTER AND SEARCH PROCESSING PIPELINE */
    function processFilters() {
        const scrollBox = document.getElementById("inventoryScrollContainer");
        scrollBox.innerHTML = "";
        
        const searchVal = document.getElementById("blookSearchInput").value.toLowerCase().trim();
        const dropDownVal = document.getElementById("categoryFilterDropdown").value;
        
        let validItems = [...inventoryData];
        
        if(searchVal !== "") {
            validItems = validItems.filter(item => item.name.toLowerCase().includes(searchVal));
        }
        
        if(dropDownVal !== "all") {
            const [filterType, targetValue] = dropDownVal.split(":");
            if(filterType === "pack") {
                validItems = validItems.filter(item => item.packName === targetValue);
            } else if(filterType === "rarity") {
                validItems = validItems.filter(item => item.rarity === targetValue);
            }
        }
        
        if (validItems.length === 0) {
            scrollBox.innerHTML = `<div class="no-results-text">No matching Blooks found.</div>`;
            return;
        }

        const groups = {};
        validItems.forEach(item => {
            if(!groups[item.packName]) {
                groups[item.packName] = [];
            }
            groups[item.packName].push(item);
        });

        Object.keys(groups).forEach(packTitle => {
            const section = document.createElement("div");
            section.className = "pack-section";

            const titleEl = document.createElement("div");
            titleEl.className = "pack-section-title";
            titleEl.textContent = packTitle;
            
            const lineEl = document.createElement("hr");
            lineEl.className = "pack-section-line";

            const gridEl = document.createElement("div");
            gridEl.className = "blook-image-container";

            groups[packTitle].forEach(item => {
                const button = document.createElement("button");
                button.className = "blook-img-btn";
                
                const isLocked = item.qty === 0;
                const activeSrc = (item.image && item.image !== "") ? item.image : FALLBACK_IMAGE;

                if (isLocked) {
                    button.classList.add("locked");
                    button.innerHTML = `
                        <div class="blook-qty-badge" style="background-color: #555555;">
                            <span class="material-icons">lock</span>
                        </div>
                        <img class="blook-graphic" src="${activeSrc}" alt="${item.name}">
                    `;
                } else {
                    button.onclick = () => openCardModal(item);
                    button.innerHTML = `
                        <div class="blook-qty-badge" style="background-color: ${item.rarityColor};">${item.qty}</div>
                        <img class="blook-graphic" src="${activeSrc}" alt="${item.name}">
                    `;
                }
                
                gridEl.appendChild(button);
            });

            section.appendChild(titleEl);
            section.appendChild(lineEl);
            section.appendChild(gridEl);
            scrollBox.appendChild(section);
        });
    }

    /* VIEW CARD MODAL CONTROLLERS */
    function openCardModal(blookItem) {
        selectedBlook = blookItem;
        
        document.getElementById("modalName").textContent = blookItem.name;
        document.getElementById("modalRarity").textContent = blookItem.rarity;
        document.getElementById("modalRarity").style.backgroundColor = blookItem.rarityColor;
        document.getElementById("modalChance").textContent = blookItem.chance + "%";
        document.getElementById("modalOwned").textContent = "Owned: " + blookItem.qty;
        document.getElementById("modalGraphic").src = (blookItem.image && blookItem.image !== "") ? blookItem.image : FALLBACK_IMAGE;
        
        const price = rarityValues[blookItem.rarity] || 5;
        document.getElementById("sellValue").textContent = price;
        
        document.getElementById("sellDupesBtn").style.display = blookItem.qty > 1 ? "block" : "none";

        overlay.classList.add("show");
        modalContainer.classList.add("show");
    }

    function closeCardModal() {
        modalContainer.classList.remove("show");
        if(!menu.classList.contains("open")) {
            overlay.classList.remove("show");
        }
        selectedBlook = null;
    }

    /* QUANTITY ACCOUNT TRANSACTION PIEPLINES (UPDATED FOR ARRAY-SET REPLICAS) */
    document.getElementById("sellSingleBtn").onclick = async () => {
        if (!selectedBlook || selectedBlook.qty <= 0) return;
        
        const value = rarityValues[selectedBlook.rarity] || 5;
        coins += value;
        
        // Remove one matching instance from array tracking profile
        const collectionArray = Array.from(ownedBlocks);
        const targetIndex = collectionArray.indexOf(selectedBlook.name);
        if (targetIndex > -1) {
            collectionArray.splice(targetIndex, 1);
        }
        ownedBlocks = new Set(collectionArray);
        
        document.getElementById("coinCount").textContent = coins;
        await saveUserData();
        
        selectedBlook.qty -= 1;
        if (selectedBlook.qty === 0) {
            closeCardModal();
        } else {
            openCardModal(selectedBlook);
        }
        buildRuntimeInventory();
    };

    document.getElementById("sellDupesBtn").onclick = async () => {
        if (!selectedBlook || selectedBlook.qty <= 1) return;
        
        const duplicateCount = selectedBlook.qty - 1;
        const value = (rarityValues[selectedBlook.rarity] || 5) * duplicateCount;
        
        coins += value;
        
        // Keep only one occurrence of the item in the array tracking profile
        const collectionArray = Array.from(ownedBlocks).filter(name => name !== selectedBlook.name);
        collectionArray.push(selectedBlook.name);
        ownedBlocks = new Set(collectionArray);
        
        document.getElementById("coinCount").textContent = coins;
        await saveUserData();
        
        selectedBlook.qty = 1;
        openCardModal(selectedBlook);
        buildRuntimeInventory();
    };

    // Listeners for UI interaction updates
    document.getElementById("blookSearchInput").oninput = processFilters;
    document.getElementById("categoryFilterDropdown").onchange = processFilters;

</script>
</body>
</html>
